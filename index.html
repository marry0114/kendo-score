<!doctype html>
<html lang="ja">
<head><link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#05275c">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>剣道スコア</title>
<style>
body{font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;margin:0;background:#f6f7fb;color:#111}
header{background:#05275c;color:white;padding:14px 16px;font-size:22px;font-weight:800}
.wrap{padding:10px}.top,.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
input,select,textarea{font-size:16px;padding:10px;border:1px solid #bbb;border-radius:8px;width:100%;box-sizing:border-box;background:white}
textarea{min-height:80px}
table{width:100%;border-collapse:collapse;background:white;table-layout:fixed}
th,td{border:1px solid #999;text-align:center;padding:8px}
th{background:#06265a;color:white;font-size:18px}
.team-red{background:#ffe6e6;color:#b40000;font-weight:800;font-size:22px}
.team-blue{background:#eaf1ff;color:#002b75;font-weight:800;font-size:22px}
.name-red{background:#fff0f0;color:#b40000;font-weight:700}
.name-blue{background:#eef4ff;color:#002b75;font-weight:700}
.cell{height:90px;font-size:34px;white-space:pre-line}
.selected{outline:4px solid #ffb300;outline-offset:-4px}
.panel{background:white;border:1px solid #ddd;border-radius:12px;margin-top:12px;padding:12px}
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
button{font-size:16px;font-weight:700;padding:12px;border-radius:10px;border:1px solid #aaa;background:white}
.main{background:#05275c;color:white}.danger{background:#fff0f0;color:#b40000}.wide{grid-column:span 2}
.big{font-size:20px;padding:18px}.result{font-size:18px;font-weight:800;margin-top:8px}
.small{font-size:13px;color:#555}.history{font-size:14px;margin-top:8px;line-height:1.7}
.hidden{display:none}
@media print{header,.panel,.modeBtns{display:none}body{background:white}.wrap{padding:0}}
</style>
</head>

<body>
<header>⚔️ 剣道スコア</header>
<div class="wrap">

<div class="panel modeBtns">
  <div class="buttons">
    <button class="main wide big" onclick="showMode('team')">👥 団体戦</button>
    <button class="main wide big" onclick="showMode('single')">👤 個人戦</button>
  </div>
</div>

<div id="teamMode">
<div class="top">
<input id="tournament" placeholder="大会名" oninput="autoSave()">
<input id="matchNo" placeholder="試合No." oninput="autoSave()">
<input id="redTeam" value="館山中" oninput="render()">
<input id="blueTeam" value="幕張本郷" oninput="render()">
</div>

<table>
<tr><th>団体名</th><th>先鋒</th><th>次鋒</th><th>中堅</th><th>副将</th><th>大将</th><th>勝点</th></tr>
<tr><td class="team-red" rowspan="2" id="rt"></td><td class="name-red" contenteditable oninput="autoSave()">齊藤</td><td class="name-red" contenteditable oninput="autoSave()">小谷</td><td class="name-red" contenteditable oninput="autoSave()">加藤</td><td class="name-red" contenteditable oninput="autoSave()">大川</td><td class="name-red" contenteditable oninput="autoSave()">小割</td><td rowspan="2" id="redScore" class="team-red"></td></tr>
<tr><td class="cell" onclick="selectCell(0)"></td><td class="cell" onclick="selectCell(1)"></td><td class="cell" onclick="selectCell(2)"></td><td class="cell" onclick="selectCell(3)"></td><td class="cell" onclick="selectCell(4)"></td></tr>
<tr><td class="team-blue" rowspan="2" id="bt"></td><td class="cell" onclick="selectCell(5)"></td><td class="cell" onclick="selectCell(6)"></td><td class="cell" onclick="selectCell(7)"></td><td class="cell" onclick="selectCell(8)"></td><td class="cell" onclick="selectCell(9)"></td><td rowspan="2" id="blueScore" class="team-blue"></td></tr>
<tr><td class="name-blue" contenteditable oninput="autoSave()">河合</td><td class="name-blue" contenteditable oninput="autoSave()"></td><td class="name-blue" contenteditable oninput="autoSave()">金城</td><td class="name-blue" contenteditable oninput="autoSave()">津茂谷</td><td class="name-blue" contenteditable oninput="autoSave()">吉田</td></tr>
</table>

<div class="panel"><div class="small">入力したいマスをタップしてからボタンを押す</div>
<div class="buttons">
<button onclick="add('○')">○ 一本勝ち</button><button onclick="add('◯')">◯</button><button onclick="add('メ')">メ</button><button onclick="add('コ')">コ</button>
<button onclick="add('ド')">ド</button><button onclick="add('ツ')">ツ</button><button onclick="add('反')">反</button><button onclick="add('▲')">▲ 延長</button>
<button class="wide" onclick="clearCell()">選択マスを消す</button><button class="wide" onclick="resetCurrent()">入力リセット</button>
<button class="main wide" onclick="saveHistory()">団体戦を保存</button><button class="main wide" onclick="downloadCSV()">CSV保存</button>
<button class="main wide" onclick="window.print()">PDF印刷</button><button class="wide" onclick="saveTeamPreset()">チーム登録</button>
</div><div class="result" id="winner"></div></div>

<div class="panel"><b>登録チーム呼び出し</b><div class="row"><select id="redPreset"></select><select id="bluePreset"></select></div>
<div class="buttons"><button class="wide" onclick="loadPreset('red')">赤に呼び出し</button><button class="wide" onclick="loadPreset('blue')">白に呼び出し</button></div></div>

<div class="panel"><b>保存した団体戦履歴</b><div class="history" id="history"></div>
<div class="buttons"><button class="wide" onclick="loadHistory()">履歴を呼び出し</button><button class="danger wide" onclick="clearHistory()">履歴を全部消す</button></div></div>
</div>

<div id="singleMode" class="hidden">
<div class="panel">
<b>👤 個人戦記録</b>
<div class="top">
<input id="sTournament" placeholder="大会名">
<input id="sMatchNo" placeholder="試合No.">
<input id="sName" placeholder="自分の名前">
<input id="sOpponent" placeholder="相手の名前">
<input id="sOpponentTeam" placeholder="相手の所属">
<select id="sResult"><option>勝ち</option><option>負け</option><option>引き分け</option></select>
<select id="sPoint"><option>取った技なし</option><option>メ</option><option>コ</option><option>ド</option><option>ツ</option><option>メ・メ</option><option>メ・コ</option><option>コ・メ</option><option>反則勝ち</option></select>
<select id="sLost"><option>取られた技なし</option><option>メ</option><option>コ</option><option>ド</option><option>ツ</option><option>メ・メ</option><option>メ・コ</option><option>コ・メ</option><option>反則負け</option></select>
<select id="sFirst"><option>先取：自分</option><option>先取：相手</option><option>先取：なし</option></select>
<select id="sExtra"><option>延長なし</option><option>延長あり</option></select>
<select id="sMyHansoku"><option>自分反則0</option><option>自分反則1</option><option>自分反則2</option></select>
<select id="sOpHansoku"><option>相手反則0</option><option>相手反則1</option><option>相手反則2</option></select>
</div>
<textarea id="sMemo" placeholder="良かった点・課題・メモ"></textarea>
<div class="buttons">
<button class="main wide" onclick="saveSingle()">個人戦を保存</button>
<button class="wide" onclick="resetSingle()">入力リセット</button>
<button class="main wide" onclick="downloadSingleCSV()">個人戦CSV保存</button>
<button class="main wide" onclick="window.print()">PDF印刷</button>
</div>
</div>

<div class="panel"><b>保存した個人戦履歴</b><div class="history" id="singleHistory"></div>
<div class="buttons"><button class="danger wide" onclick="clearSingleHistory()">個人戦履歴を全部消す</button></div></div>
</div>

</div>

<script>
var selected=0,data=Array.from({length:10},function(){return[]}),waza=['メ','コ','ド','ツ','反','○','◯'];
function q(s){return document.querySelector(s)}
function qa(s){return Array.from(document.querySelectorAll(s))}
function showMode(m){q('#teamMode').classList.toggle('hidden',m!=='team');q('#singleMode').classList.toggle('hidden',m!=='single');localStorage.setItem('kendoMode',m);showSingleHistory()}
function getNames(){return{red:qa('.name-red').map(x=>x.textContent.trim()),blue:qa('.name-blue').map(x=>x.textContent.trim())}}
function setNames(n){if(!n)return;qa('.name-red').forEach((x,i)=>x.textContent=(n.red&&n.red[i])||'');qa('.name-blue').forEach((x,i)=>x.textContent=(n.blue&&n.blue[i])||'')}
function selectCell(i){selected=i;render()}
function add(x){data[selected].push(x);render()}
function clearCell(){data[selected]=[];render()}
function countSide(start){var wins=0,ippon=0;for(var i=start;i<start+5;i++){var c=data[i].filter(x=>waza.indexOf(x)>=0).length;ippon+=c;var o=data[i<5?i+5:i-5].filter(x=>waza.indexOf(x)>=0).length;if(c>o)wins++}return{wins:wins,ippon:ippon}}
function currentResult(){var r=countSide(0),b=countSide(5),red=q('#redTeam').value,blue=q('#blueTeam').value,winner='引き分け';if(r.wins>b.wins||(r.wins===b.wins&&r.ippon>b.ippon))winner=red;if(b.wins>r.wins||(r.wins===b.wins&&b.ippon>r.ippon))winner=blue;return{date:new Date().toLocaleString(),tournament:q('#tournament').value,matchNo:q('#matchNo').value,red:red,blue:blue,names:getNames(),redWins:r.wins,redIppon:r.ippon,blueWins:b.wins,blueIppon:b.ippon,winner:winner,scores:data.map(a=>a.join(' '))}}
function autoSave(){localStorage.setItem('kendoCurrentFull',JSON.stringify({tournament:q('#tournament').value,matchNo:q('#matchNo').value,red:q('#redTeam').value,blue:q('#blueTeam').value,names:getNames(),data:data}))}
function restoreCurrent(){try{var o=JSON.parse(localStorage.getItem('kendoCurrentFull'));if(o){q('#tournament').value=o.tournament||'';q('#matchNo').value=o.matchNo||'';q('#redTeam').value=o.red||'館山中';q('#blueTeam').value=o.blue||'幕張本郷';data=o.data||data;setNames(o.names)}}catch(e){}}
function render(){q('#rt').textContent=q('#redTeam').value;q('#bt').textContent=q('#blueTeam').value;qa('.cell').forEach((td,i)=>{td.textContent=data[i].join(' ');td.classList.toggle('selected',i===selected);td.style.color=i<5?'#b40000':'#002b75'});var x=currentResult();q('#redScore').textContent=x.redIppon+'\n/\n'+x.redWins;q('#blueScore').textContent=x.blueIppon+'\n/\n'+x.blueWins;q('#winner').textContent='現在の結果：'+x.winner;autoSave();showHistory();showPresets()}
function resetCurrent(){if(confirm('今の団体戦入力を全部消しますか？')){data=Array.from({length:10},()=>[]);q('#tournament').value='';q('#matchNo').value='';render()}}
function getHistory(){try{return JSON.parse(localStorage.getItem('kendoHistory')||'[]')}catch(e){return[]}}
function saveHistory(){var h=getHistory();h.unshift(currentResult());localStorage.setItem('kendoHistory',JSON.stringify(h));alert('団体戦を保存しました');showHistory()}
function showHistory(){var h=getHistory();q('#history').innerHTML=h.length?h.map((x,i)=>'<label><input type="radio" name="hist" value="'+i+'"> '+(i+1)+'. '+x.date+'<br>'+(x.tournament||'')+' '+(x.matchNo||'')+'<br>'+x.red+' '+x.redWins+'勝'+x.redIppon+'本 ／ '+x.blue+' '+x.blueWins+'勝'+x.blueIppon+'本 → '+x.winner+'</label><hr>').join(''):'まだ保存はありません'}
function loadHistory(){var c=q('input[name="hist"]:checked');if(!c){alert('呼び出す履歴を選んでください');return}var x=getHistory()[Number(c.value)];q('#tournament').value=x.tournament||'';q('#matchNo').value=x.matchNo||'';q('#redTeam').value=x.red||'';q('#blueTeam').value=x.blue||'';setNames(x.names);data=(x.scores||[]).map(s=>s?String(s).split(' '):[]);while(data.length<10)data.push([]);render()}
function clearHistory(){if(confirm('保存した団体戦履歴を全部消しますか？')){localStorage.removeItem('kendoHistory');showHistory()}}
function downloadCSV(){var h=getHistory();if(!h.length){alert('保存した試合がありません');return}var rows=[['日時','大会名','試合No','赤団体','白団体','赤勝者数','赤本数','白勝者数','白本数','勝者','先鋒赤','次鋒赤','中堅赤','副将赤','大将赤','先鋒白','次鋒白','中堅白','副将白','大将白']];h.forEach(x=>rows.push([x.date,x.tournament||'',x.matchNo||'',x.red,x.blue,x.redWins,x.redIppon,x.blueWins,x.blueIppon,x.winner].concat(x.scores)));makeCSV(rows,'kendo-team-history.csv')}
function getPresets(){try{return JSON.parse(localStorage.getItem('kendoPresets')||'{}')}catch(e){return{}}}
function saveTeamPreset(){var team=prompt('登録するチーム名を入力してください',q('#redTeam').value);if(!team)return;var side=confirm('赤チームの選手名を登録しますか？ OK＝赤 / キャンセル＝白')?'red':'blue';var p=getPresets();p[team]={team:team,names:getNames()[side]};localStorage.setItem('kendoPresets',JSON.stringify(p));alert(team+'を登録しました');showPresets()}
function showPresets(){var p=getPresets(),opts='<option value="">チームを選択</option>'+Object.keys(p).map(k=>'<option value="'+k+'">'+k+'</option>').join('');if(q('#redPreset').innerHTML!==opts)q('#redPreset').innerHTML=opts;if(q('#bluePreset').innerHTML!==opts)q('#bluePreset').innerHTML=opts}
function loadPreset(side){var key=q(side==='red'?'#redPreset':'#bluePreset').value;if(!key){alert('チームを選んでください');return}var p=getPresets()[key];if(side==='red'){q('#redTeam').value=p.team;qa('.name-red').forEach((td,i)=>td.textContent=p.names[i]||'')}else{q('#blueTeam').value=p.team;qa('.name-blue').forEach((td,i)=>td.textContent=p.names[i]||'')}render()}

function getSingleHistory(){try{return JSON.parse(localStorage.getItem('kendoSingleHistory')||'[]')}catch(e){return[]}}
function saveSingle(){var x={date:new Date().toLocaleString(),tournament:q('#sTournament').value,matchNo:q('#sMatchNo').value,name:q('#sName').value,opponent:q('#sOpponent').value,opponentTeam:q('#sOpponentTeam').value,result:q('#sResult').value,point:q('#sPoint').value,lost:q('#sLost').value,first:q('#sFirst').value,extra:q('#sExtra').value,myHansoku:q('#sMyHansoku').value,opHansoku:q('#sOpHansoku').value,memo:q('#sMemo').value};var h=getSingleHistory();h.unshift(x);localStorage.setItem('kendoSingleHistory',JSON.stringify(h));alert('個人戦を保存しました');showSingleHistory()}
function showSingleHistory(){var h=getSingleHistory();q('#singleHistory').innerHTML=h.length?h.map((x,i)=>(i+1)+'. '+x.date+'<br>'+(x.tournament||'')+' '+(x.matchNo||'')+'<br>'+x.name+' vs '+x.opponent+'（'+(x.opponentTeam||'')+'） → '+x.result+'<br>取った技：'+x.point+' ／ 取られた技：'+x.lost+'<br>'+x.first+'・'+x.extra+'<br>メモ：'+(x.memo||'')+'<hr>').join(''):'まだ保存はありません'}
function resetSingle(){if(confirm('個人戦の入力を消しますか？')){['sTournament','sMatchNo','sName','sOpponent','sOpponentTeam','sMemo'].forEach(id=>q('#'+id).value='')}}
function clearSingleHistory(){if(confirm('保存した個人戦履歴を全部消しますか？')){localStorage.removeItem('kendoSingleHistory');showSingleHistory()}}
function downloadSingleCSV(){var h=getSingleHistory();if(!h.length){alert('保存した個人戦がありません');return}var rows=[['日時','大会名','試合No','自分','相手','相手所属','結果','取った技','取られた技','先取','延長','自分反則','相手反則','メモ']];h.forEach(x=>rows.push([x.date,x.tournament,x.matchNo,x.name,x.opponent,x.opponentTeam,x.result,x.point,x.lost,x.first,x.extra,x.myHansoku,x.opHansoku,x.memo]));makeCSV(rows,'kendo-single-history.csv')}
function makeCSV(rows,name){var csv=rows.map(r=>r.map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(',')).join('\n');var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()}

restoreCurrent();render();showMode(localStorage.getItem('kendoMode')||'team');
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
</html>
